<style>
    /* Contenedor del Formulario */
    .form-container {
        max-width: 600px;
        background: #fdfdfd;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        font-family: 'Segoe UI', sans-serif;
    }

    .form-header {
        margin-bottom: 25px;
        border-bottom: 1px solid #eee;
        padding-bottom: 15px;
    }

    .form-header h2 {
        color: var(--primary-dark);
        margin: 0;
        font-size: 1.5rem;
    }

    /* Organización en filas */
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 15px;
    }

    .full-width {
        grid-column: span 2;
        margin-bottom: 15px;
    }

    /* Botonera */
    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 30px;
    }
</style>

<div class="form-container">
    <div class="form-header">
        <h2>Nuevo Servicio / Producto</h2>
    </div>

    <form id="service-form" method="POST">
        <div class="full-width">
            <plus-title 
                label="Nombre del Servicio" 
                name="name" 
                placeholder="Ej. Limpieza Dental Profunda" 
                required>
            </plus-title>
        </div>

        <div class="form-row">
            <input-field 
                type="text" 
                label="Categoría" 
                name="category" 
                placeholder="Seleccione..." 
                list="categories-list">
            </input-field>
            
            <datalist id="categories-list">
                <option value="Estética">
                <option value="Ortodoncia">
                <option value="Cirugía">
            </datalist>

            <input-field 
                type="text" 
                label="Tipo" 
                name="pack_type" 
                placeholder="Servicio" 
                list="type-choices">
            </input-field>
            
            <datalist id="type-choices">
                <option value="Servicio">
                <option value="Producto">
                <option value="Pack/Combo">
            </datalist>
        </div>

        <div class="full-width">
            <input-field 
                label="Descripción Breve" 
                name="description" 
                placeholder="Detalles del tratamiento...">
            </input-field>
        </div>

        <div class="form-row" style="align-items: end;">
            <plus-quantity 
                label="Precio Base ($)" 
                name="base_price" 
                value="0.00" 
                step="0.50" 
                min="0">
            </plus-quantity>

            <input-field 
                type="number" 
                label="IVA %" 
                name="tax_rate" 
                value="16" 
                placeholder="16">
            </input-field>
        </div>

        <div class="row">
            <div class="col-4">
                <button type="button" class="btn-cancel">Cancelar</button>
            </div>
            <div class="col-12">
                <button type="button" class="btn-save">Crear Servicio</button>
            </div>
        </div>
    </form>
</div>
