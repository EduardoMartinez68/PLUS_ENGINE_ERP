<message-pop title="services.title.departament" name="form-pop-departament">
    <div class="container-pop">
        <form id="formPopDepartament">
            <div class="row section">
                <div class="col">
                    <input type="hidden" id="idFormDepartament" name="id">
                    <plus-title label="services.input.name-departament" name="name" placeholder="services.placeholder.name" required id="nameDepartamentForm"></plus-title>
                </div>
            </div>
        </form>
    </div>
    <button type="button" class="btn btn-success btn-normal" t="btn.save" id="btn-form-departament" onclick="send_form_departament_to_the_server()"></button>
</message-pop>

<script>
    (()=>{
        function restart_form(){
            const form = document.getElementById('formPopDepartament');
            form.reset();

            window.hide_pop('form-pop-departament');
        }

        async function get_information_departament(departament_id){
            //this function is for get the information of the departament 
            const backend=await window.send_message_to_the_server(`/services/get_information_departament/${departament_id}/`, {}, true, 'GET')
            if(backend.success){
                //if get the information from the server now we will update the form 
                const data=backend.answer;
                document.getElementById('idFormDepartament').value=departament_id;
                document.getElementById('nameDepartamentForm').value=data.name;
                window.show_pop('form-pop-departament');
                return;
            }

            window.show_alert('error', 'services.message.not-can-get-the-information-departament', backend.message || '', backend.error || '');
        }

        async function open_pop_departament(departament_id=null){
            restart_form();
            
            //if have a ID of the departament we will to call to the function for get his information
            if((Number.isInteger(departament_id))){
                //here we will see if exist a id for open the pop.
                //If exist an id is because the user would like update a departament and we will to update the input in the input
                //else is because the user would like add a new departament
                document.getElementById('idFormDepartament').value=departament_id;
                await get_information_departament(departament_id);
                return;
            }

            document.getElementById('idFormDepartament').value='';
            window.show_pop('form-pop-departament');
        }

        async function add_new_departament(){
            const backend=await window.send_form_to_the_server('formPopDepartament', '/services/add_departament/');
            if(backend.success){
                restart_form();
                window.show_notification('success', 'services.success.the-departament-was-add');
                return;
            }

            window.show_alert('alert', 'services.message.the-department-not-was-created', backend.message || '', backend.error || '');
        }

        async function update_departament(departament_id){
            const backend=await window.send_form_to_the_server('formPopDepartament', `/services/update_departament/${departament_id}/`);
            if(backend.success){
                restart_form();
                
                //here we will see if the partial of <formSpeed> is in the home of services, for update his container
                if (typeof window.update_container_home_services === "function") {
                    window.update_container_home_services();
                }

                window.show_notification('success', 'services.success.the-departament-was-update');
                return;
            }

            window.show_alert('alert', 'services.message.the-department-not-was-update', backend.message || '', backend.error || '');
        }


        async function send_form_departament_to_the_server(){
            //here we will see if exist or not exist the ID in the form
            //if exist the ID is because the user would like update the departament
            const id=document.getElementById('idFormDepartament').value;
            if(id && id.trim() !== ""){
                await update_departament(id);
                return;
            }

            await add_new_departament();
        }

        window.open_pop_departament=open_pop_departament;
        window.send_form_departament_to_the_server=send_form_departament_to_the_server;
    })();
</script>
