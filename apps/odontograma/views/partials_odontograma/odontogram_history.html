<div class="container-section">
    <div class="row">
        <div class="col">
            <plus-search input_id="search-odontograma">
                <search-option>
                    <button class="btn btn-add" onclick="open_message_pop_history_odontogram()">+</button>
                </search-option>
            </plus-search>
        </div>
    </div>



    <div class="container-odontograms" id="container-odontograms">
        <div class="row section">
            <div class="col-2">
                <div class="skeleton skeleton-circle"></div>
            </div>
            <div class="col-10">
                <div class="skeleton skeleton-rect" style="width: 90%;"></div><br>
                <div class="skeleton skeleton-rect" style="width: 50%;"></div>
            </div>
        </div>
        <div class="row section">
            <div class="col-2">
                <div class="skeleton skeleton-circle"></div>
            </div>
            <div class="col-10">
                <div class="skeleton skeleton-rect" style="width: 90%;"></div><br>
                <div class="skeleton skeleton-rect" style="width: 50%;"></div>
            </div>
        </div>
        <div class="row section">
            <div class="col-2">
                <div class="skeleton skeleton-circle"></div>
            </div>
            <div class="col-10">
                <div class="skeleton skeleton-rect" style="width: 90%;"></div><br>
                <div class="skeleton skeleton-rect" style="width: 50%;"></div>
            </div>
        </div>
    </div>
</div>


<message-pop title="odontogram.title.create-odontogram-history" name="message-pop-history-odontogram" >
    <form id="form-history-odontogram">
        <div class="section">
            <plus-title label="odontogram.label.create-odontogram-history" placeholder="odontogram.placeholder.create-odontogram-history" name="key_odontogram" id="key_odontogram"></plus-title>
        </div>
        <plus-switch text="odontograma.label.this-patient-be-a-kit"  name="is_kid" id="is_kid"></plus-switch>
        <plus-switch text="odontogram.labe.would-like-create-a-copy"  name="is_copy" id="is_copy"></plus-switch>
        <br>
        <button class="btn btn-add btn-success" t="btn.add" onclick="save_new_history()" type="button"></button>
    </form>
</message-pop>

<script>
function get_div_odontograma(){
    return `
        <history-card-odontogram
            id={ id }
            key={ key }
            notes={ notes }
            photo={ photo }
            created-at={ created_at }
            updated-at={ updated_at }
            is-kid={ is_kid }
            blocked={ blocked }>
        </history-card-odontogram>
    `
}

if (!customElements.get("history-card-odontogram")) {


const textHistory=window.translate_text('odontogram.label.history');
const textNotes=window.translate_text('odontogram.label.notes');
const textKid=window.translate_text('odontogram.label.kid');
const textBlocked=window.translate_text('odontogram.label.blocked');
const textCreate=window.translate_text('odontogram.label.created-at');
const textUpdated=window.translate_text('odontogram.label.updated-at');

class HistoryCardOdontogram extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({ mode: "open" });
  }

  connectedCallback() {
    const key = this.getAttribute("key") || textHistory;
    const notes = this.getAttribute("notes") || textNotes;
    const createdAt = this.getAttribute("created-at") || "";
    const updatedAt = this.getAttribute("updated-at") || "";
    const isKid = window.is_true(this.getAttribute("is-kid"));
    const blocked = window.is_true(this.getAttribute("blocked"));
    const photo = this.getAttribute("photo") || this._placeholderImage();

    const wrapper = document.createElement("article");
    wrapper.className = "card";
    wrapper.tabIndex = 0;

    wrapper.innerHTML = `
      <div class="left">
        <div class="meta">
          <div class="title">
            ${this._escapeHtml(key)}
            ${isKid ? `<span class="tag kid">${textKid}</span>` : ""}
            ${blocked ? `<span class="tag blocked">${textBlocked}</span>` : ""}
          </div>
          <div class="dates">
            <span>${textCreate}: ${this._escapeHtml(createdAt)}</span>
            <span>${textUpdated}: ${this._escapeHtml(updatedAt)}</span>
          </div>
          <div class="notes">${this._escapeHtml(notes)}</div>
        </div>
      </div>

      <style>
        :host {
          display: block;
          margin: 8px 0;
          font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
        }

        .card {
          display: flex;
          background: white;
          border-radius: 12px;
          padding: 14px;
          box-shadow: 0 3px 10px rgba(16,24,40,0.06);
          border: 1px solid rgba(16,24,40,0.07);
          cursor: pointer;
          transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .card:hover {
          transform: translateY(-2px);
          box-shadow: 0 5px 16px rgba(16,24,40,0.12);
        }

        .left {
          display: flex;
          gap: 16px;
          align-items: flex-start;
          width: 100%;
        }

        .avatar {
          width: 62px;
          height: 62px;
          flex-shrink: 0;
          border-radius: 10px;
          overflow: hidden;
          background: #f0f0f0;
        }

        .avatar img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        .meta {
          flex: 1;
          display: flex;
          flex-direction: column;
          gap: 6px;
        }

        .title {
          font-size: 15px;
          font-weight: 600;
          color: #0f172a;
          display: flex;
          gap: 6px;
          align-items: center;
          flex-wrap: wrap;
        }

        .tag {
          padding: 2px 6px;
          font-size: 10px;
          border-radius: 4px;
          text-transform: uppercase;
          font-weight: 700;
          letter-spacing: 0.5px;
        }

        .kid {
          background: #dbeafe;
          color: #1d4ed8;
        }

        .blocked {
          background: #fee2e2;
          color: #b91c1c;
        }

        .dates {
          font-size: 11px;
          color: #64748b;
          display: flex;
          gap: 16px;
        }

        .notes {
          font-size: 13px;
          color: #334155;
          margin-top: 4px;
        }

        @media (max-width: 600px) {
          .card {
            flex-direction: column;
          }
          .left {
            flex-direction: column;
            align-items: center;
            text-align: center;
          }
          .dates {
            justify-content: center;
          }
          .notes {
            text-align: center;
          }
        }
      </style>
    `;

    // Eventos
    wrapper.addEventListener("click", () => {
      this.dispatchEvent(
        new CustomEvent("open-history", {
          detail: { id: this.getAttribute("id") },
          bubbles: true,
          composed: true,
        })
      );
    });

    this.shadowRoot.innerHTML = "";
    this.shadowRoot.appendChild(wrapper);
  }

  _placeholderImage() {
    return (
      "data:image/svg+xml;utf8," +
      encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">
        <rect width="100%" height="100%" fill="#f3f4f6"/>
        <circle cx="32" cy="24" r="12" fill="#9ca3af"/>
        <rect x="16" y="40" width="32" height="18" rx="6" fill="#9ca3af"/>
      </svg>
      `)
    );
  }

  _escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }
}

customElements.define("history-card-odontogram", HistoryCardOdontogram);
}

window.update_container_with_seeker(
    'search-odontograma', 
    'container-odontograms', 
    get_div_odontograma(), 
    `odontograma/get_information_of_the_history_odotngoram/${document.getElementById('odontogram_id').value}/`, 
    'GET'
)



function restart_form_history_odontogram(){
    document.getElementById('key_odontogram').value = ''
    document.getElementById('is_kid').setChecked(false)
    document.getElementById('is_copy').setChecked(true)
}

function open_message_pop_history_odontogram(){
    //restart the form 
    restart_form_history_odontogram();

    //show the pop
    window.show_pop('message-pop-history-odontogram');
}


async function save_new_history(){
    //first we will see if exist a id of the odontogram
    const odontogram_id=document.getElementById('odontogram_id').value;
    if(!odontogram_id){
        window.show_alert('success', 'odontogram.error.unexpected-creating-odontogram-history', 'odontogram.error.not-exist-id', 'Not exist a ID of the odontogram')
        return;
    }

    //now we will see if exist a key in the form
    const key=document.getElementById('key_odontogram').value;
    if(!key){
        window.show_alert('success', 'odontogram.error.unexpected-creating-odontogram-history', 'odontogram.error.this-key-of-the-odontogram-is-requerid', 'You need add the key to the new record')
        return;
    }

    //now here we will send the form to the server and we will see if can be saved in the database
    const backend=await send_form_to_the_server('form-history-odontogram', `odontograma/create_odontogram_history/${odontogram_id}/`);
    if(backend.success){
        //if we can create the new history, we will update the container with the new history added
        window.nextWeb(`odontograma/view_odontogram/${odontogram_id}/`);
        window.show_alert('success', 'odontogram.success.odontogram-history-created', 'odontogram.description.odontogram-history-created')
    }else{
        window.show_alert('error', 'odontogram.error.odontogram-history-not-created', backend.message || 'odontogram.description.unexpected-creating-odontogram-history', backend.error || '')
    }
}
</script>
