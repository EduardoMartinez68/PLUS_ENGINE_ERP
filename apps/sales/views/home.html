<style>
/* Alignment helpers */
.text-right {
    text-align: right;
}

.text-center {
    text-align: center;
}

/* Reference column */
.ref {
    font-weight: 600;
    color: #2c3e50;
}

/* Balance highlight */
.balance {
    font-weight: 600;
}

/* Status badges */
.status {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
}

/* Status colors */
.status-pending {
    background: #e5e7eb;
    color: #374151;
}

.status-accepted {
    background: #fff3cd;
    color: #856404;
}

.status-paid {
    background: #d4edda;
    color: #155724;
}

.status-cancelled {
    background: #f8d7da;
    color: #721c24;
}

.status-expired {
    background: #ffe5b4;
    color: #8a5700;
}

.user-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  overflow: hidden;

  display: flex;
  align-items: center;
  justify-content: center;

  font-weight: 600;
  font-size: 13px;

  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
  color: #1e40af;
}

.avatar-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.avatar-initials {
  letter-spacing: 0.5px;
}

.col-name     { width: 18%; min-width: 140px; }
</style>
<message-pop title="title-filter" name="pop-filter-sales">
    <div class="row section">
        <div class="col">
            <plus-select label="sales.filter.customer" link="customers/customers_search/" method="GET" id="customer_id_filter"></plus-select>
        </div>
        <div class="col">
            <plus-select link="/departament_employee/search_employee/" label="sales.filter.user" id="employee_id_filter"></plus-select>
        </div>
    </div>
    <div class="row section">
        <div class="col">
            <input-field label="sales.filter.date_start" type="date" id="date_start_filter"></input-field>
        </div>
        <div class="col">
            <input-field label="sales.filter.date_finish" type="date" id="date_finish_filter"></input-field>
        </div>
    </div>
    <div class="row section">
        <div class="col">
            <plus-select label="sales.filter.status" name="status" id="status_filter">
                <option value="all" t="sales.general.all"></option>
                <option value="pending" t="sales.status.pending"></option>
                <option value="accepted" t="sales.status.accepted"></option>
                <option value="paid" t="sales.status.paid"></option>
                <option value="cancelled" t="sales.status.cancelled"></option>
                <option value="expiration_date" t="sales.status.expired"></option>
            </plus-select>
        </div>
    </div>

    <div class="row">
        <div class="col-8">
            <button t="message.success" class="btn btn-edit btn-success" onclick="window.hide_pop('pop-filter-sales')"></button>
        </div>
        <div class="col-4">
            <button t="sale.btn.delete-filter" class="btn btn-secondary btn-success" onclick="restart_filters()"></button>
        </div>
    </div>
</message-pop>


<div class="container-section">
        <plus-help-video 
            videos='[
            {"title":"¿Cómo Crear Ventas y Cotizaciones en tu clinica Denta?","url":"https://www.youtube.com/embed/iWU4xq-RXGE?si=1egZD3q31xRJHlGl"},
            {"title":"¿Cómo Cancelar una Venta?","url":"https://www.youtube.com/embed/sprz2vvxXcQ?si=LyCfiLoTZI8hmpbo"}
            ]'>
        </plus-help-video><br>
    <h4 t="sale.title.sale-and-services"></h4>
    <div class="row">
        <div class="col p-3">
            <plus-search input_id="search-sales">
                <search-option>
                    <button class="btn btn-transparent" onclick="window.show_pop('pop-filter-sales')"><i class="fi fi-rr-settings-sliders"></i></button>
                </search-option>
                <search-option>
                    <button class="btn btn-add" onclick="window.nextWeb('/sales/add_sale/')">+</button>
                </search-option>
            </plus-search>
        </div>
    </div>
    <div class="table-container">
        <table class="plus-table">
            <thead>
                <tr>
                    <th t="sale.th.id"></th>
                    <th t="sale.th.name"></th>
                    <th t="sale.th.customer"></th>
                    <th t="sale.th.doctor"></th>
                    <th t="sale.th.date"></th>
                    <th class="text-right" t="sale.th.total"></th>
                    <th class="text-right" t="sale.th.buy"></th>
                    <th class="text-right" t="sale.th.saldo"></th>
                    <th class="text-center" t="sale.th.currency"></th>
                    <th class="text-center" t="sale.th.status"></th>
                </tr>
            </thead>

            <tbody id="container-table-sales">

            </tbody>
        </table>
    </div>
</div>


<script>
    (()=>{
        function get_div(){
            return `
            <tr onclick="window.nextWeb('/sales/view_sale/{id}/')">
                <td class="ref" sales_id='{id}'>{reference}</td>
                <td t='{name_sale}'></td>
                <td t='{customer}'></td>
                <td>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div class="avatar">
                            <img src="{photo_user}" alt="{user}" class="avatar-img">
                        </div>
                        <span class="font-semibold">{user}</span>
                    </div>
                </td>
                <td>{creationDate}</td>
                <td class="text-right">$ {total}</td>
                <td class="text-right">$ {amount_paid}</td>
                <td class="text-right balance">$ {balance}</td>
                <td class="text-center">{currency}</td>
                <td class="text-center">
                    <span class="status status-{status}" t='sales.status.{status}'></span>
                </td>
            </tr>
            `
        }


        window.update_container_with_seeker(
            ['search-sales', 'customer_id_filter', 'employee_id_filter', 'date_start_filter', 'date_finish_filter', 'status_filter'],
            'container-table-sales', get_div(), `/sales/get_the_sales/`, 'GET', true);


        function reload_sales(){
            window.update_container_from_the_server(
                ['search-sales', 'customer_id_filter', 'employee_id_filter', 'date_start_filter', 'date_finish_filter', 'status_filter'],
                'container-table-sales', get_div(), `/sales/get_the_sales/`, 'GET', true);
        }

        function restart_filters(){
            document.getElementById('customer_id_filter').reset();
            document.getElementById('employee_id_filter').reset();
            document.getElementById('date_start_filter').value = '';
            document.getElementById('date_finish_filter').value = '';
            document.getElementById('status_filter').reset();

            reload_sales();
        }

        window.reload_sales=reload_sales;
        window.restart_filters=restart_filters;
    })();
</script>


<script>
(()=>{
    //this variable is for can render all the container
    //this variable are remplace when the server run and load all the container
    const namespace = "{plus}";
    
    //here your create a function encapsulated
    function render_canva() {
        console.log("¡Ejecutando render_canva desde la clave {plus}!");
    }

    // save the function in the variable globale <AppFunctions> for after use in other scripts 
    window.Plus.Functions.define(namespace, "render", render_canva);
    window.Plus.Functions.get(namespace).render_canva(); //here we run a function in specific
})();
</script>
