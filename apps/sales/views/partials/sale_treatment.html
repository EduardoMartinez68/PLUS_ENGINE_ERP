<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">


<div id="note-container"></div>











<script>
  function initQuill() {
    const container = document.getElementById('note-container');
    
    // 1. Si no existe el div, no hacemos nada
    if (!container) return;

    // 2. Si ya existe una instancia y está conectada al DOM, no hacemos nada
    if (window.containerNote && document.body.contains(window.containerNote.container)) {
        return;
    }

    // 3. Si llegamos aquí, necesitamos (re)inicializar
    const quill = new Quill('#note-container', {
        theme: 'snow',
        placeholder: 'Escribe notas del paciente aquí...',
        modules: {
            toolbar: [
                [{ font: [] }],
                [{ size: ['small', false, 'large', 'huge'] }],
                [{ header: [1, 2, 3, 4, 5, 6, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ script: 'sub' }, { script: 'super' }],
                [{ color: [] }, { background: [] }],
                [{ align: [] }],
                [{ list: 'ordered' }, { list: 'bullet' }, { list: 'check' }],
                [{ indent: '-1' }, { indent: '+1' }],
                [{ direction: 'rtl' }],
                ['blockquote', 'code-block'],
                ['link'],
                ['clean']
            ]
        }
    });

    window.containerNote = quill;
}

// Observador de cambios en el DOM
const observer = new MutationObserver(() => {
    initQuill();
});

// Empezamos a observar el body (o un contenedor padre estable)
observer.observe(document.body, { childList: true, subtree: true });

// Llamada inicial por si el elemento ya está ahí al cargar
initQuill();
</script>
