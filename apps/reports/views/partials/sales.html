<div class="filter-container">
    <button class="btn-filter-trigger" data-target="popover-filters-sales">
        <i class="fi fi-rr-filter"></i> <span t="reports.label.filters"></span>
    </button>

    <div id="popover-filters-sales" class="custom-popover">
        <div class="row section">
            <div class="col">
                <input-field label="sales.filter.date_start" type="date" id="date-start-sales"></input-field>
            </div>
            <div class="col">
                <input-field label="sales.filter.date_finish" type="date" id="date-finish-sales"></input-field>
            </div>
        </div>
        <div class="row section">
            <div class="col">
                <plus-select id="select-branch-sale" link="/setting/search_branches/"
                    label="reports.label.select-branch">
                </plus-select>
            </div>
            <div class="col">
                <plus-select id="select-user-sale" label="reports.select.user"
                    link="/departament_employee/search_employee/" method="GET">

                </plus-select>
            </div>
        </div>
        <div class="row section">
            <div class="col">
                <plus-select id="select-customer-sale" label="reports.select.customer"
                    link="customers/customers_search/" method="GET">

                </plus-select>
            </div>
            <div class="col">
                <plus-select label="sales.filter.status" name="status" id="status-filter-sale">
                    <option value="all" t="sales.general.all"></option>
                    <option value="pending" t="sales.status.pending"></option>
                    <option value="accepted" t="sales.status.accepted"></option>
                    <option value="paid" t="sales.status.paid"></option>
                    <option value="cancelled" t="sales.status.cancelled"></option>
                    <option value="expiration_date" t="sales.status.expired"></option>
                </plus-select>
            </div>
            <div class="col">
                <plus-select id="include_items-sales" label="reports.select.item-incluye" value="0">
                    <option value="0" t="reports.option.not"></option>
                    <option value="1" t="reports.option.yes"></option>
                </plus-select>
            </div>
        </div>


        <div class="row popover-actions">
            <button class="btn-action-clean" t="sale.btn.delete-filter" onclick="restart_filters_sales()">
                Limpiar (0)
            </button>
            <button class="btn-action-search" popovertarget="popover-filters" popovertargetaction="hide" onclick="update_table_sales()"
                 t="reports.label.make-report">
            </button>
        </div>
    </div>
</div>
<table-sales id="table-sales-reports"></table-sales>


<message-pop title="reports.title.download-sales" name="pop-download-sales">
    <div class="row">
        <div class="col">
            <download-file id="btnDownloadExcelSales" type="excel" filename="Ventas por cliente"
                records="7 Registros a exportar" date-range="12/08/2025 - 12/08/2025"
                onclick="download_excel_sales('xlsx')">
            </download-file>
        </div>
        <div class="col">
            <download-file id="btnDownloadPdfSales" type="pdf" filename="Ventas por cliente"
                records="7 Registros a exportar" date-range="12/08/2025 - 12/08/2025"
                onclick="download_excel_sales('pdf')">
            </download-file>
        </div>
    </div>
    <br><br><br>
    <button class="btn btn-edit btn-success" t="btn.success" onclick="window.hide_pop('pop-download-sales')"></button>
</message-pop>


<script>
    async function update_table_sales() {
        const tableElement = document.getElementById('table-sales-reports');
        if (tableElement && typeof tableElement.loadData === 'function') {
            await tableElement.loadData();
        }
    }

    if (!customElements.get("table-sales")) {
        class TableSales extends HTMLElement {

            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
                this.page = 1;
                this.loading = false;

                this.data = [];
                this.pagination = {};
                this.summary = {};

            }

            connectedCallback() {
                this.render();
                this.loadData();
            }

            getUpdateTextDate() {

            }

            getFilters() {
                return {
                    page: this.page,
                    key: document.getElementById('search-sales')?.value || '',
                    branch_id: document.getElementById('select-branch-sale').getValue() || '',
                    user_id: document.getElementById('select-user-sale').getValue() || '',
                    customer_id: document.getElementById('select-customer-sale').getValue() || '',
                    status: document.getElementById('status-filter-sale').getValue() || '',
                    include_items: document.getElementById('include_items-sales').getValue() || 0,
                    date_start: document.getElementById('date-start-sales')?.value || '',
                    date_end: document.getElementById('date-finish-sales')?.value || ''
                };
            }

            async loadData() {
                try {
                    this.loading = true;
                    this.render();
                    const dataToServer = JSON.stringify(this.getFilters());

                    const data = await window.send_message_to_the_server('reports/search_reports_sales/', dataToServer, false, 'GET');
                    this.data = data.answer || [];
                    this.pagination = data.pagination || {};
                    this.summary = data.summary || {};
                } catch (error) {
                    console.error(error);
                    this.data = [];
                } finally {
                    this.loading = false;
                    this.render();
                }
            }

            renderSkeleton() {
                let html = '';
                for (let i = 0; i < 7; i++) {
                    html += `
                <tr>
                    <td colspan="6">
                        <div class="skeleton-row"></div>
                    </td>
                </tr>`;
                }
                return html;
            }

            renderRows() {

                if (!this.data.length) {
                    return `
        <tr>
            <td colspan="9" style="text-align:center;padding:40px;color:#64748b;">
                No se encontraron ventas en este periodo.
            </td>
        </tr>`;
                }

                return this.data.map(item => {

                    const total = parseFloat(item.total || 0);
                    const paid = parseFloat(item.amount_paid || 0);
                    const balance = parseFloat(item.balance || 0);

                    return `
        <tr>

            <td>
                <div class="main-text font-bold">
                    ${item.reference || '-'}
                </div>
            </td>

            <td>
                <div class="main-text">
                    ${window.translate_text(item.name_sale)}
                </div>

                <div class="sub-text">
                    ${item.branch || ''}
                </div>
            </td>

            <td>
                <div class="main-text">
                    ${window.translate_text(item.customer)}
                </div>
            </td>

            <td>
                <div class="user-cell">
                    <img
                        src="${item.photo_user}"
                        class="user-avatar"
                        alt="Doctor">

                    <span class="main-text">
                        ${item.user}
                    </span>
                </div>
            </td>

            <td>
                <div class="date-text">
                    ${item.creationDate}
                </div>
            </td>

            <td class="text-right">
                <span class="amount-in">
                    ${window.format_currency(
                        total,
                        item.currency
                    )}
                </span>
            </td>

            <td class="text-right">
                <span style="color:#10b981;font-weight:600;">
                    ${window.format_currency(
                        paid,
                        item.currency
                    )}
                </span>
            </td>

            <td class="text-right">
                <span style="color:${balance > 0 ? '#f59e0b' : '#000000'};font-weight:600;">
                    ${window.format_currency(
                        balance,
                        item.currency
                    )}
                </span>
            </td>

            <td>
                <div class="status-pill status-${item.status}">
                    ${window.translate_text(
                        `sales.status.${item.status}`
                    )}
                </div>
            </td>

        </tr>`;
                }).join('');
            }

            changePage(page) {
                if (page < 1 || page > this.pagination.total_pages || page === this.page) return;
                this.page = page;
                this.loadData();
            }

            renderPagination() {
                const { page, total_pages, has_next, has_previous } = this.pagination;
                if (!total_pages || total_pages <= 1) return '';

                // Generar números de página dinámicos compactos
                let pagesHtml = '';
                let startPage = Math.max(1, page - 2);
                let endPage = Math.min(total_pages, page + 2);

                for (let i = startPage; i <= endPage; i++) {
                    pagesHtml += `
                    <button class="page-num ${i === page ? 'active' : ''}" data-page="${i}">
                        ${i}
                    </button>
                `;
                }

                return `
            <div class="pagination-container">
                <div class="pagination-info">
                    Mostrando página <strong>${page}</strong> de <strong>${total_pages}</strong>
                </div>
                <div class="pagination-buttons">
                    <button class="page-nav" ${!has_previous ? 'disabled' : ''} data-page="${page - 1}">
                        &larr; Anterior
                    </button>
                    ${pagesHtml}
                    <button class="page-nav" ${!has_next ? 'disabled' : ''} data-page="${page + 1}">
                        Siguiente &rarr;
                    </button>
                </div>
            </div>`;
            }

            setupPaginationEvents() {
                // Manejador de clicks para la paginación dentro del Shadow DOM
                const buttons = this.shadowRoot.querySelectorAll('.pagination-buttons button');
                buttons.forEach(button => {
                    button.addEventListener('click', () => {
                        const pageTarget = parseInt(button.getAttribute('data-page'));
                        if (pageTarget) this.changePage(pageTarget);
                    });
                });

                // Evento para el botón de descargar nativo del componente
                const btnDownload = this.shadowRoot.querySelector('.btn-download');
                if (btnDownload) {
                    btnDownload.addEventListener('click', () => {
                        if (typeof window.open_pop_reports_move === 'function') {
                            window.open_pop_reports_move();
                        } else {
                            console.warn('window.open_pop_reports_move no está definida');
                        }
                    });
                }
            }

            render() {
                this.shadowRoot.innerHTML = `
            <style>
                :host { 
                    --blue-brand: #0284c7;
                    --blue-brand-hover: #0369a1;
                    --text-main: #1e293b;
                    --text-muted: #64748b;
                    --text-light: #94a3b8;
                    --border: #edf2f7;
                    --row-hover: #f8fafc;
                    --bg-card: #ffffff;
                    
                    display: block;
                    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                    -webkit-font-smoothing: antialiased;
                }

                .card {
                    background: var(--bg-card);
                    border: 1px solid #e2e8f0;
                    border-radius: 16px;
                    padding: 24px;
                    box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.03);
                }

                .header { 
                    display: flex; 
                    justify-content: space-between; 
                    align-items: center; 
                    margin-bottom: 24px; 
                }
                
                h3 { 
                    margin: 0; 
                    color: var(--text-main); 
                    font-size: 1.25rem;
                    font-weight: 700; 
                }
                
                .btn-download {
                    background: #f1f5f9; 
                    color: var(--text-main); 
                    border: 1px solid #e2e8f0;
                    padding: 8px 16px; 
                    border-radius: 8px; 
                    font-weight: 600; 
                    font-size: 0.875rem;
                    cursor: pointer;
                    transition: all 0.2s ease;
                }
                .btn-download:hover {
                    background: #e2e8f0;
                }

                /* Estilos de la Tabla */
                .table-container {
                    width: 100%;
                    max-height: 50vh; /* Ajusta esta altura (ej: 400px o 50vh) según lo largo que desees el contenedor */
                    overflow-y: auto;  /* Activa el scrollbar vertical cuando el contenido exceda el max-height */
                    overflow-x: auto;  /* Mantiene el soporte para scroll horizontal en pantallas móviles */
                    position: relative; /* Es indispensable para fijar el elemento superior (thead) */
                }

                table { 
                    width: 100%; 
                    border-collapse: collapse; 
                    text-align: left;
                }
                
                th { 
                    padding: 14px 16px; 
                    color: var(--text-muted); 
                    font-size: 0.8rem; 
                    font-weight: 600;
                    text-transform: uppercase; 
                    letter-spacing: 0.05em;
                    border-bottom: 1px solid var(--border); 
                    background: #fafafa;
                }
                
                td { 
                    padding: 16px; 
                    border-bottom: 1px solid var(--border); 
                    color: var(--text-main); 
                    font-size: 0.925rem;
                    vertical-align: top;
                }
                
                tr:hover td {
                    background-color: var(--row-hover);
                }

                /* Tipografías específicas de la imagen */
                .date-text {
                    font-size: 0.75rem;
                    color: var(--text-light);
                    margin-bottom: 2px;
                }
                .main-text {
                    color: var(--text-main);
                    font-size: 0.9rem;
                }
                .font-bold {
                    font-weight: 700;
                }
                .sub-text {
                    font-size: 0.8rem;
                    color: var(--text-muted);
                    margin-top: 2px;
                }

                /* Badges / Etiquetas grises */
                .badge-sub {
                    display: inline-block;
                    background: #e2e8f0;
                    color: #475569;
                    font-size: 0.7rem;
                    font-weight: 700;
                    padding: 2px 6px;
                    border-radius: 4px;
                    margin-top: 4px;
                    text-transform: uppercase;
                }
                
                /* Estilos de Celdas Complejas */
                .user-cell { 
                    display: flex; 
                    align-items: center; 
                    gap: 12px; 
                }
                
                .user-avatar { 
                    width: 36px; 
                    height: 36px; 
                    border-radius: 50%; 
                    object-fit: cover;
                    border: 1px solid #e2e8f0;
                }

                .payment-cell {
                    display: flex;
                    align-items: flex-start;
                    gap: 10px;
                }

                .icon-cash {
                    color: #2563eb;
                    margin-top: 2px;
                }

                /* Montos alineados y con colores correctos */
                .text-right {
                    text-align: right;
                }
                .amount-in { 
                    color: #0f172a; 
                    font-weight: 600; 
                }
                .amount-out { 
                    color: #0f172a; 
                    font-weight: 600; 
                }

                /* Barra de totales / Resumen */
                .summary-bar {
                    display: flex; 
                    justify-content: flex-end; 
                    flex-wrap: wrap;
                    gap: 32px; 
                    margin-top: 24px; 
                    padding-top: 20px; 
                    border-top: 1px solid var(--border);
                }
                
                .summary-item { 
                    text-align: right; 
                }
                
                .summary-item label { 
                    display: block; 
                    font-size: 0.75rem; 
                    color: var(--text-muted); 
                    font-weight: 500;
                    margin-bottom: 4px;
                }
                
                .summary-item span { 
                    font-size: 1.15rem; 
                    font-weight: 700; 
                    color: var(--text-main); 
                }

                /* Componente de Paginación Mejorado */
                .pagination-container {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-top: 24px;
                    padding-top: 16px;
                    border-top: 1px solid var(--border);
                }

                .pagination-info {
                    font-size: 0.85rem;
                    color: var(--text-muted);
                }

                .pagination-buttons {
                    display: flex;
                    gap: 6px;
                    align-items: center;
                }

                .pagination-buttons button {
                    background: #ffffff;
                    border: 1px solid #e2e8f0;
                    padding: 6px 12px;
                    border-radius: 8px;
                    font-size: 0.85rem;
                    font-weight: 500;
                    color: var(--text-main);
                    cursor: pointer;
                    transition: all 0.2s ease;
                }

                .pagination-buttons button:hover:not([disabled]) {
                    background: #f1f5f9;
                    border-color: #cbd5e1;
                }

                .pagination-buttons button[disabled] {
                    color: var(--text-light);
                    background: #f8fafc;
                    cursor: not-allowed;
                    opacity: 0.6;
                }

                .pagination-buttons button.page-num {
                    width: 36px;
                    height: 36px;
                    padding: 0;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }

                .pagination-buttons button.page-num.active {
                    background: var(--blue-brand);
                    color: #ffffff;
                    border-color: var(--blue-brand);
                    font-weight: 600;
                }

                /* Skeleton Loader Animado */
                .skeleton-row {
                    height: 48px;
                    background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
                    background-size: 200% 100%;
                    animation: loading 1.5s infinite;
                    border-radius: 6px;
                }

                @keyframes loading {
                    0% { background-position: 200% 0; }
                    100% { background-position: -200% 0; }
                }

                /* Píldoras de Estado (Method) */
                .status-pill {
                    padding: 4px 12px;
                    border-radius: 20px;
                    font-size: 0.85rem;
                    font-weight: 600;
                    text-transform: capitalize;
                }

                /* Colores por método */
                .status-cash {
                    background-color: #def7ec;
                    color: #03543f;
                }

                .status-card {
                    background-color: #e1effe;
                    color: #1e429f;
                }

                .status-transfer {
                    background-color: #e5edff;
                    color: #42389d;
                }

                /* 'Change' resaltado en rojo porque implica salida de dinero */
                .status-change {
                    background-color: #fde8e8;
                    color: #9b591c;
                }

                /* Pequeño detalle para el monto negativo en 'change' */
                .status-change + .amount {
                    color: #c56c30;
                }


                .status-outside {
                    background-color: #fde8e8;
                    color: #9b1c1c;
                }

                .status-outside + .amount {
                    color: #c53030;
                }

                .status-inside {
                    background-color: #def7ec;
                    color: #03543f;
                }
                .status-pending{
                    background:#fef3c7;
                    color:#92400e;
                }

                .status-accepted{
                    background:#dbeafe;
                    color:#1e40af;
                }

                .status-paid{
                    background:#dcfce7;
                    color:#166534;
                }

                .status-cancelled{
                    background:#fee2e2;
                    color:#991b1b;
                }

                .status-expiration_date{
                    background:#f3e8ff;
                    color:#7e22ce;
                }
            </style>
            
            <div class="card">
                <div class="header">
                    <h3></h3>
                    <button class="btn-download" onclick="open_pop_reports_sales()">Descargar</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Referencia</th>
                                <th>Venta</th>
                                <th>Paciente</th>
                                <th>Doctor</th>
                                <th>Fecha</th>
                                <th style="text-align:right;">Total</th>
                                <th style="text-align:right;">Pagado</th>
                                <th style="text-align:right;">Saldo</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${this.loading ? this.renderSkeleton() : this.renderRows()}
                        </tbody>
                    </table>
                </div>

                <div class="summary-bar">

                    <div class="summary-item">
                        <label>Ventas</label>
                        <span>${this.summary.total_sales || 0}</span>
                    </div>

                    <div class="summary-item" style="border-left: 4px solid #3b82f6; padding-left: 8px;">
                        <label style="color: #3b82f6; font-weight: bold;">Aceptadas</label>
                        <span style="color: #3b82f6; font-weight: bold;">${this.summary.accepted_sales || 0}</span>
                    </div>

                    <div class="summary-item" style="border-left: 4px solid #f59e0b; padding-left: 8px;">
                        <label style="color: #f59e0b; font-weight: bold;">Pendientes</label>
                        <span style="color: #f59e0b; font-weight: bold;">${this.summary.pending_sales || 0}</span>
                    </div>

                    <div class="summary-item" style="border-left: 4px solid #dc3545; padding-left: 8px;">
                        <label style="color: #dc3545; font-weight: bold;">Canceladas</label>
                        <span style="color: #dc3545; font-weight: bold;">${this.summary.cancelled_sales || 0}</span>
                    </div>

                    <div class="summary-item" style="border-left: 4px solid #10b981; padding-left: 8px;">
                        <label style="color: #10b981; font-weight: bold;">Total cobrado</label>
                        <span style="color: #10b981; font-weight: bold;">
                            ${
                                this.summary.paid_sales || 0
                            }
                        </span>
                    </div>


                    <div class="summary-item">
                        <label>Total vendido</label>
                        <span>
                            ${window.format_currency(
                    this.summary.total_amount || 0,
                    window.get_currency_system(),
                    false,
                    true
                )}
                        </span>
                    </div>


                    <div class="summary-item">
                        <label>Total cobrado</label>
                        <span style="color:#10b981;">
                            ${window.format_currency(
                    this.summary.total_paid || 0,
                    window.get_currency_system(),
                    false,
                    true
                )}
                        </span>
                    </div>

                    <div class="summary-item">
                        <label>Saldo pendiente</label>
                        <span style="color:#f59e0b;">
                            ${window.format_currency(
                    this.summary.total_balance || 0,
                    window.get_currency_system(),
                    false,
                    true
                )}
                        </span>
                    </div>

                </div>

                ${this.renderPagination()}
            </div>
            `;

                // Escuchar eventos de la nueva paginación mapeada en el shadowRoot
                this.setupPaginationEvents();
            }
        }
        customElements.define('table-sales', TableSales);
    }

    (() => {
        // 1. select the table for see
        const targetTable = document.getElementById('table-sales-reports');
        if (targetTable) {
            // 2. here we will to create the observer
            const observer = new IntersectionObserver((entries, observerInstance) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // 3. run the function fot update the container
                        window.set_initial_week_inputs('date-start-sales', 'date-finish-sales');
                        update_table_sales();
                        observerInstance.unobserve(entry.target);
                    }
                });
            }, {
                root: null,
                threshold: 0.1
            });

            // 5. activate the watchment of the table
            observer.observe(targetTable);
        }
    })();
</script>
<script>
    (() => {
        function open_pop_reports_sales() {
            const title = window.translate_text('reports.title.reports-sales');

            const date_start = document.getElementById('date-start-sales')?.value || '';
            const date_finish = document.getElementById('date-finish-sales')?.value || '';
            let rangeDate = `${date_start}/${date_finish}`
            if (date_start == '' && date_finish == '') {
                rangeDate = window.translate_text('reports.label.all-date');
            }


            const records = '';

            const btnDownloadExcelSales = document.getElementById('btnDownloadExcelSales')
            if (btnDownloadExcelSales) {
                btnDownloadExcelSales.setFilename(title);
                btnDownloadExcelSales.setDateRange(rangeDate);
                btnDownloadExcelSales.setRecords('XLSX');
            }


            const btnDownloadPdfSales = document.getElementById('btnDownloadPdfSales');
            if (btnDownloadPdfSales) {
                btnDownloadPdfSales.setFilename(title);
                btnDownloadPdfSales.setDateRange(rangeDate);
                btnDownloadPdfSales.setRecords('PDF');
            }

            window.show_pop('pop-download-sales');
        }

        function restart_filters_sales() {
            const date_start = document.getElementById('date-start-sales').value = '';
            const date_finish = document.getElementById('date-finish-sales').value = '';
            const user = document.getElementById('select-user-sale')?.reset() || '';
            const customer = document.getElementById('select-customer-sale')?.reset() || '';
            const status = document.getElementById('status-filter-sale')?.reset() || '';
            const pack_id = document.getElementById('select-pack-sale')?.reset() || '';
            const id_branch = document.getElementById('select-branch-sale')?.reset() || '';
        }

        function download_excel_sales(type = 'xlsx') {
            //get all the values of the data 
            const date_start = document.getElementById('date-start-sales')?.value || '';
            const date_finish = document.getElementById('date-finish-sales')?.value || '';
            const user = document.getElementById('select-user-sale')?.getValue() || '';
            const customer = document.getElementById('select-customer-sale')?.getValue() || '';
            const status = document.getElementById('status-filter-sale')?.getValue() || '';
            const include_items = document.getElementById('include_items-sales')?.getValue() || false;
            const id_branch = document.getElementById('select-branch-sale')?.getValue() || '';

            // 2. Construir los Query Parameters para la URL
            const params = new URLSearchParams({
                start_date: date_start,
                end_date: date_finish,
                user_id: user,
                customer_id: customer,
                include_items: include_items,
                status: status,
                branch_id: id_branch
            });

            // 3. Mostrar la pantalla de carga
            const loader = document.getElementById('report-loader-overlay');
            if (loader) loader.classList.remove('report-loader-hidden');

            // 4. URL de tu vista de Django (ajusta la ruta según tus urls.py)
            let link = 'download_excel_sale'
            if (type == 'pdf') {
                link = 'download_pdf_sale'
            }
            const url = `/reports/${link}/?${params.toString()}`;

            // 5. Petición HTTP asíncrona
            fetch(url, { method: 'GET' })
                .then(response => {
                    // Verificar si el servidor respondió correctamente
                    if (!response.ok) throw new Error('Error al generar el reporte');

                    // Validar si el backend devolvió un JSON de error de permisos
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        return response.json().then(json => {
                            if (!json.success) alert(`Error: ${json.error || 'Sin permisos'}`);
                            return null;
                        });
                    }

                    // Si es el archivo binario (Excel), procedemos a transformarlo a Blob
                    return response.blob();
                })
                .then(blob => {
                    if (!blob) return; // Si ocurrió un error controlado arriba

                    // 6. Crear un link temporal invisible para gatillar la descarga del navegador
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;

                    // Nombre por defecto del archivo descargado
                    a.download = `Reporte_Ventas_${new Date().toISOString().slice(0, 10)}.${type}`;

                    document.body.appendChild(a);
                    a.click(); // Simular click

                    // Limpieza del DOM
                    a.remove();
                    window.URL.revokeObjectURL(downloadUrl);
                })
                .catch(error => {
                    console.error('Error en la descarga:', error);
                    alert('Ocurrió un problema al descargar el reporte. Inténtalo de nuevo.');
                })
                .finally(() => {
                    // 7. Ocultar siempre la pantalla de carga al finalizar (éxito o error)
                    if (loader) loader.classList.add('report-loader-hidden');
                });
        }

        window.restart_filters_sales = restart_filters_sales;
        window.download_excel_sales = download_excel_sales;
        window.open_pop_reports_sales = open_pop_reports_sales;
    })();
</script>
